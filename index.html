<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ProPianist</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <img
            src="assets/logo.png"
            alt="ProPianist"
            class="logo">

    <h1>ProPianist</h1>

    <p class="tagline">
        Learn • Practice • Inspire
    </p>

    <div class="card">

        <h2>Authentication Portal</h2>

        <p class="description">
            Welcome to the ProPianist authentication portal.
            This portal securely manages email verification,
            password recovery and your account.
        </p>

        <div class="buttonGroup">

            <a href="#"
               class="primaryButton">
                Open ProPianist
            </a>

            <a href="#"
               class="secondaryButton">
                Privacy Policy
            </a>

        </div>

    </div>

    <div class="footer">

        © 2026 ProPianist

    </div>

</div>

</body>
</html>
