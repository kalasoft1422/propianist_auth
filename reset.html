<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reset Password • ProPianist</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <img
            src="assets/logo.png"
            class="logo"
            alt="ProPianist">

    <h1>ProPianist</h1>

    <p class="tagline">
        Learn • Practice • Inspire
    </p>

    <div class="card">

        <h2 id="title">
            Reset Password
        </h2>

        <p
                id="message"
                class="description">

            Enter your new password below.

        </p>

        <div id="passwordPanel" class="form">

            <input
                    id="password"
                    class="textBox"
                    type="password"
                    placeholder="New Password">

            <input
                    id="confirmPassword"
                    class="textBox"
                    type="password"
                    placeholder="Confirm New Password">

            <button
                    id="updateButton"
                    class="primaryButton">

                Update Password

            </button>

        </div>

        <div
                id="status"
                class="status">

        </div>

        <div class="buttonGroup">

            <a
                    id="openButton"
                    href="propianist://auth"
                    class="secondaryButton"
                    style="display:none;">

                Open ProPianist

            </a>

        </div>

    </div>

    <div class="footer">

        © 2026 ProPianist

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/supabase.js"></script>

<script src="js/reset.js"></script>

</body>

</html>
